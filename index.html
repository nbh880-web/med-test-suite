<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med-Test Pro | Ultimate</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Heebo',sans-serif;background:#f8fafc;color:#0f172a}
        .wm{position:fixed;bottom:10px;left:10px;opacity:.12;font-size:10px;pointer-events:none;font-weight:700}
        .ld{border:3px solid #e2e8f0;border-top:3px solid #c2410c;border-radius:50%;width:20px;height:20px;animation:sp .8s linear infinite;display:inline-block}
        @keyframes sp{to{transform:rotate(360deg)}}
        @keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.6)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}.rp{animation:rp 1.5s infinite}
        .sc::-webkit-scrollbar{width:5px}.sc::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
        textarea:focus,input:focus{outline:none;border-color:#c2410c!important;box-shadow:0 0 0 3px rgba(194,65,12,.12)}
    </style>
</head>
<body>
<div id="root"></div>
<div class="wm">&copy; זכויות יוצרים לניתאי מלכה</div>
<script type="text/babel">
const { useState, useEffect, useRef, Fragment } = React;

const UNIS = {
    mor: { name: 'מו"ר / מרק"ם', limit: 750 },
    bgu: { name: 'בן-גוריון', limit: 1200 },
    tzfat: { name: 'צפת / בר-אילן', limit: 850 }
};

const DEFAULT_QS = [
    'ספר על מקרה שבו פגעת במישהו. איך הבנת שפגעת? איך הרגשת ואיך פעלת?',
    'תאר מצב של תקשורת לא טובה מול אדם אחר. מה הקושי? איך ראית את הסיטואציה?',
    'תאר משימה חשובה שנכשלת בה למרות שציפית להצליח. מה הרגשת?',
    'ספר על מקרה שבו קיבלת ביקורת משמעותית. מה הסיטואציה ואיך הגבת?'
];

const RUBRIC = "You are an extremely strict examiner for Israeli medical school admissions. Use STAR and HEXACO models. ALL evaluation text MUST be in Hebrew. Respond ONLY with valid JSON.";
const COMMITTEE_PROMPT = `אתה צוות מעריכים בוועדת הקבלה לרפואה. להלן תמלול של ראיון. עליך להפיק דו"ח בפורמט JSON בלבד הכולל: {"total_score": מספר מ-1 עד 100, "one_line": "משפט סיכום", "sections": {"technical": {"score": X}, "narrative": {"score": X}, "personality": {"score": X}}, "rewrite_suggestion": "נקודות לשיפור"}. הערך כנות, ענווה ורפלקציה.`;

function Bar(p){
    const pct = Math.round((p.score/p.max)*100);
    const c = pct >= 80 ? '#16a34a' : pct >= 60 ? '#ca8a04' : '#dc2626';
    return(
        <div style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:600,marginBottom:3,color:'#475569'}}><span>{p.label}</span><span style={{color:c}}>{p.score}/{p.max}</span></div>
            <div style={{height:6,borderRadius:3,background:'#e2e8f0',overflow:'hidden'}}><div style={{height:'100%',width:pct+'%',background:c,borderRadius:3,transition:'width .6s'}}/></div>
        </div>
    );
}

function App(){
    const [view, setView] = useState('home');
    const [keys, setKeys] = useState(null);
    const [qText, setQText] = useState('');
    const [text, setText] = useState('');
    const [loading, setLoading] = useState(false);
    const [results, setResults] = useState(null);
    const [uni, setUni] = useState('tzfat');
    
    // Chat & Martin State
    const [chat, setChat] = useState([]);
    const [mLd, setMLd] = useState(false);
    const [isMartinRec, setIsMartinRec] = useState(false);
    const [martinFeedback, setMartinFeedback] = useState(null);
    
    // Media Recorder Refs
    const mediaRecorderRef = useRef(null);
    const audioChunksRef = useRef([]);
    const currentAudioRef = useRef(null);
    const ceRef = useRef(null);

    // Timer States
    const [timer, setTimer] = useState(180);
    const [tOn, setTOn] = useState(false);

    useEffect(() => { fetch('/api/keys').then(r=>r.json()).then(d => setKeys(d)); }, []);

    useEffect(() => {
        let iv;
        if(tOn && timer > 0) iv = setInterval(() => setTimer(t => t - 1), 1000);
        else if(timer === 0) setTOn(false);
        return () => clearInterval(iv);
    }, [tOn, timer]);

    useEffect(() => { if(ceRef.current) ceRef.current.scrollIntoView({behavior:'smooth'}); }, [chat]);

    const pickQ = () => setQText(DEFAULT_QS[Math.floor(Math.random() * DEFAULT_QS.length)]);

    // --- Text Recording (For Text Practice) ---
    const [isRec, setIsRec] = useState(false);
    const [recO, setRecO] = useState(null);
    const togRec = () => {
        if(isRec && recO) { recO.stop(); setIsRec(false); setRecO(null); return; }
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SR) { alert('השתמש בדפדפן כרום.'); return; }
        const r = new SR(); r.lang = 'he-IL'; r.continuous = true;
        r.onresult = (e) => {
            let f = ''; for(let i=e.resultIndex; i<e.results.length; i++) if(e.results[i].isFinal) f += e.results[i][0].transcript + ' ';
            if(f) setText(p => p + ' ' + f);
        };
        r.onerror = () => { setIsRec(false); setRecO(null); };
        r.onend = () => { setIsRec(false); setRecO(null); };
        r.start(); setIsRec(true); setRecO(r);
    };

    // --- Audio Recording (For Martin) ---
    const toggleMartinAudioRec = async () => {
        if (isMartinRec && mediaRecorderRef.current) {
            mediaRecorderRef.current.stop();
            setIsMartinRec(false);
            return;
        }
        
        // Stop any currently playing Martin audio
        if (currentAudioRef.current) {
            currentAudioRef.current.pause();
            currentAudioRef.current = null;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mediaRecorder = new MediaRecorder(stream);
            audioChunksRef.current = [];
            
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunksRef.current.push(e.data); };
            
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                stream.getTracks().forEach(track => track.stop());
                
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = async () => {
                    const base64Audio = reader.result.split(',')[1];
                    await sendAudioToMartin(base64Audio);
                };
            };
            
            mediaRecorderRef.current = mediaRecorder;
            mediaRecorder.start();
            setIsMartinRec(true);
        } catch (e) {
            alert("לא ניתן לגשת למיקרופון. ודא שאישרת הרשאות.");
        }
    };

    const sendAudioToMartin = async (base64Audio) => {
        setMLd(true);
        try {
            const res = await fetch('/api/martin-voice', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ audioBase64: base64Audio, chatHistory: chat, uni: UNIS[uni].name })
            });
            const data = await res.json();
            
            if(data.error) { alert(data.error); return; }

            // Add both sides to the chat interface
            const newChat = [
                ...chat, 
                { role: 'user', text: data.userText },
                { role: 'martin', text: data.martinText }
            ];
            setChat(newChat);

            // Play the returned audio
            if(data.audioBase64) {
                const snd = new Audio("data:audio/mp3;base64," + data.audioBase64);
                currentAudioRef.current = snd;
                snd.play();
            }
        } catch(e) {
            console.error(e);
            alert("שגיאה בתקשורת מול מרטין.");
        } finally {
            setMLd(false);
        }
    };

    // --- End Interview & Get Feedback ---
    const endInterview = async () => {
        if(chat.length < 2) { alert('הראיון קצר מדי לניתוח.'); return; }
        setMLd(true);
        try {
            const transcript = chat.map(m => `${m.role === 'martin' ? 'מראיין' : 'מועמד'}: ${m.text}`).join('\n');
            const res = await fetch('/api/gemini', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt: transcript, system: COMMITTEE_PROMPT })
            });
            const data = await res.json();
            const txt = data.candidates[0].content.parts[0].text;
            setMartinFeedback(JSON.parse(txt.replace(/```json|```/g,'').trim()));
        } catch(e) {
            alert("שגיאה בהפקת הדו\"ח.");
        } finally {
            setMLd(false);
        }
    };

    const analyze = async () => {
        if(text.length < 20) { alert('כתוב תשובה מלאה.'); return; }
        setLoading(true); setResults(null);
        try {
            const prompt = `Institution: ${UNIS[uni].name}\nQuestion: ${qText || 'שאלה פתוחה'}\nAnswer:\n${text}`;
            const res = await fetch('/api/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt,system:RUBRIC})});
            const data = await res.json();
            const txt = data.candidates[0].content.parts[0].text;
            setResults({ gemini: JSON.parse(txt.replace(/```json|```/g,'').trim()) });
        } catch(e) { alert('שגיאה בניתוח.'); } finally { setLoading(false); }
    };

    const RC = ({data, name}) => {
        if(!data) return null;
        return(
            <div className="bg-white p-5 rounded-2xl border mb-4 fi shadow-sm">
                <div className="flex justify-between mb-3 border-b pb-2">
                    <div className="text-2xl font-black text-orange-800">{data.total_score}/100</div>
                    <div className="text-xs font-bold text-slate-400">{name}</div>
                </div>
                <p className="text-sm italic mb-4">"{data.one_line}"</p>
                <Bar label="מסגרת טכנית" score={data.sections?.technical?.score||0} max={20}/>
                <Bar label="מבנה ומסרים" score={data.sections?.narrative?.score||0} max={30}/>
                <Bar label="HEXACO - אישיות" score={data.sections?.personality?.score||0} max={50}/>
                <div className="mt-3 p-3 bg-orange-50 rounded-lg text-xs leading-relaxed text-orange-800"><b>משוב ועדת קבלה:</b> {data.rewrite_suggestion}</div>
            </div>
        );
    };

    if(!keys) return <div className="flex flex-col items-center justify-center min-h-screen gap-3"><span className="ld"></span><div className="text-slate-400 font-bold text-sm">מתחבר לכספת...</div></div>;

    return(
        <div className="min-h-screen flex flex-col">
            <header className="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                <h1 className="text-xl font-black text-slate-800 cursor-pointer" onClick={() => {setView('home'); setTOn(false);}}>Med-Test <span className="text-orange-700">Pro</span></h1>
                {view !== 'home' && <select value={uni} onChange={e=>setUni(e.target.value)} className="bg-slate-100 border-none text-xs font-bold py-2 px-4 rounded-full">{Object.entries(UNIS).map(e=><option key={e[0]} value={e[0]}>{e[1].name}</option>)}</select>}
            </header>

            <main className="flex-1 p-6 max-w-6xl mx-auto w-full">
                {view === 'home' ? (
                    <div className="grid md:grid-cols-2 gap-8 mt-12">
                        <button onClick={() => {setView('multi'); setText(''); setQText(''); setResults(null); pickQ();}} className="bg-white p-12 rounded-3xl border-2 hover:border-orange-500 transition-all text-right shadow-sm group">
                            <div className="text-4xl mb-4 group-hover:scale-110 transition-transform">✍️</div>
                            <h3 className="text-xl font-bold">תרגול כתוב משולב</h3>
                            <p className="text-sm text-slate-500 mt-2">פידבק טקסטואלי מלא</p>
                        </button>
                        <button onClick={() => {setChat([]); setMartinFeedback(null); setView('martin');}} className="bg-white p-12 rounded-3xl border-2 hover:border-orange-500 transition-all text-right shadow-sm group">
                            <div className="text-4xl mb-4 group-hover:scale-110 transition-transform">🎙️</div>
                            <h3 className="text-xl font-bold">ראיון חי מול מרטין</h3>
                            <p className="text-sm text-slate-500 mt-2">סימולטור קולי מלא (STT + TTS)</p>
                        </button>
                    </div>
                ) : view === 'multi' ? (
                    <div className="flex flex-col lg:flex-row gap-8">
                        <div className="flex-1 flex flex-col gap-4">
                            <div className="bg-orange-50 border border-orange-100 p-4 rounded-2xl flex flex-col gap-2">
                                <div className="flex justify-between items-center">
                                    <span className="text-xs font-bold text-orange-900">השאלה (הקלד או בחר):</span>
                                    <button onClick={pickQ} className="text-xs font-bold text-orange-700 bg-white px-3 py-1 rounded-full border border-orange-200">🎲 אקראית</button>
                                </div>
                                <textarea className="w-full bg-transparent border-none outline-none text-sm text-slate-800 resize-none" value={qText} onChange={e=>setQText(e.target.value)} rows="2"></textarea>
                            </div>
                            <textarea className="flex-1 min-h-[250px] p-6 border-2 rounded-3xl outline-none resize-none text-lg sc" placeholder="התשובה שלך..." value={text} onChange={e=>setText(e.target.value)}></textarea>
                            <div className="flex gap-2">
                                <button onClick={togRec} className={`w-14 h-14 rounded-2xl flex items-center justify-center text-xl shrink-0 ${isRec ? 'bg-red-500 text-white rp' : 'bg-slate-200'}`}>🎤</button>
                                <button onClick={analyze} disabled={loading} className="flex-1 bg-orange-800 text-white font-black py-4 rounded-2xl shadow-lg disabled:opacity-50">{loading ? <span className="ld"></span> : 'שלח לניתוח'}</button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto sc" style={{maxHeight:'80vh'}}>
                            {results ? <RC data={results.gemini} name="משוב ועדה"/> : <div className="h-64 flex flex-col items-center justify-center text-slate-300 font-bold">התוצאות יופיעו כאן</div>}
                        </div>
                    </div>
                ) : (
                    <div className="max-w-2xl mx-auto flex flex-col bg-white border-2 rounded-3xl overflow-hidden shadow-xl" style={{height:'80vh'}}>
                        <div className="bg-orange-50 p-4 border-b font-bold text-orange-900 flex justify-between items-center">
                            <span>👨‍⚕️ ראיון קולי מול מרטין</span>
                            <span className="text-xs bg-orange-200 px-3 py-1 rounded-full">{UNIS[uni].name}</span>
                        </div>
                        
                        {martinFeedback ? (
                            <div className="flex-1 overflow-y-auto p-6 bg-slate-50 sc">
                                <h2 className="text-xl font-black mb-4 text-center">דו"ח ועדת קבלה מסכם</h2>
                                <RC data={martinFeedback} name="ועדת קבלה מורחבת" />
                                <button onClick={() => {setChat([]); setMartinFeedback(null);}} className="w-full mt-4 bg-slate-800 text-white py-3 rounded-xl font-bold">התחל ראיון חדש</button>
                            </div>
                        ) : (
                            <Fragment>
                                <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50 sc">
                                    {chat.length === 0 && <div className="text-center text-slate-400 mt-10">לחץ על המיקרופון כדי להתחיל. הצג את עצמך קצרות.</div>}
                                    {chat.map((m,i)=><div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}><div className={`max-w-[85%] p-4 rounded-2xl ${m.role==='user'?'bg-orange-800 text-white rounded-tr-none':'bg-white border rounded-tl-none text-slate-700'}`}>{m.text}</div></div>)}
                                    {mLd && <div className="flex justify-start"><div className="bg-white border p-4 rounded-2xl rounded-tl-none flex gap-2 items-center"><span className="ld border-orange-800"></span><span className="text-xs text-slate-400">מעבד...</span></div></div>}
                                    <div ref={ceRef}/>
                                </div>
                                <div className="p-4 border-t flex gap-2 flex-col">
                                    <div className="flex gap-2">
                                        <button onClick={toggleMartinAudioRec} disabled={mLd} className={`flex-1 py-4 rounded-2xl flex items-center justify-center gap-2 font-black transition-all ${isMartinRec ? 'bg-red-500 text-white rp' : 'bg-orange-800 text-white hover:bg-orange-900'} disabled:opacity-50`}>
                                            {isMartinRec ? '⏹️ עצור הקלטה ושלח' : '🎤 לחץ להקלטה'}
                                        </button>
                                    </div>
                                    {chat.length > 0 && (
                                        <button onClick={endInterview} disabled={mLd} className="w-full py-2 text-sm font-bold text-orange-800 bg-orange-50 rounded-xl hover:bg-orange-100 transition-all">
                                            סיים ראיון וקבל משוב ועדת קבלה
                                        </button>
                                    )}
                                </div>
                            </Fragment>
                        )}
                    </div>
                )}
            </main>
        </div>
    );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
