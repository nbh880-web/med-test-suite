<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med-Test Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Heebo',sans-serif;background:#f8fafc;color:#0f172a}
        .wm{position:fixed;bottom:10px;left:10px;opacity:.12;font-size:10px;pointer-events:none;font-weight:700}
        .ld{border:3px solid #e2e8f0;border-top:3px solid #c2410c;border-radius:50%;width:20px;height:20px;animation:sp .8s linear infinite;display:inline-block}
        @keyframes sp{to{transform:rotate(360deg)}}
        @keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.6)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}.rp{animation:rp 1.5s infinite}
        @keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .4s ease-out both}
        .sc::-webkit-scrollbar{width:5px}.sc::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
        textarea:focus,input:focus,select:focus{outline:none;border-color:#c2410c!important;box-shadow:0 0 0 3px rgba(194,65,12,.12)}
    </style>
</head>
<body>
<div id="root"></div>
<div class="wm">&copy; Nitai Malka</div>
<script type="text/babel">
var useState=React.useState,useEffect=React.useEffect,useRef=React.useRef,Fragment=React.Fragment;

var UNIS={
    mor:{name:'מו"ר / מרק"ם',limit:750,desc:'סעיפים, 7-10 שורות'},
    bgu:{name:'בן-גוריון',limit:1200,desc:'פסקה 850-1200 תווים'},
    tzfat:{name:'צפת / בר-אילן',limit:850,desc:'850 תווים לסעיף'},
    haifa:{name:'חיפה',limit:1200,desc:'פסקה 850-1200 תווים'}
};

var RUBRIC="You are an extremely strict examiner for Israeli medical school admissions. Be direct, do NOT flatter.\n\nScoring Rubric (0-100):\nPart A Technical (20): Space limit(5), Chronological relevance post-highschool(5), Complete answer(5), Unique story(5).\nPart B Narrative (30): STAR model with active verbs(10), Internal rationale(10), Clarity(10).\nPart C Personality HEXACO (50): Honesty-Humility full responsibility no buts(15), Deep personal reflection not generic(15), Empathy for others(10), Real resilience under pressure(10).\n\nRed flags = 0: fabrication, blaming others, insensitivity, paternalism.\nBonuses: interpersonal difficulty, moral complexity, both sides shown.\nFor doctor simulations: communication, empathy, boundaries, patient autonomy.\nFor ethical dilemmas: complexity, conflicting values, reasoning process.\nFor video: structure, brevity 60-90sec, authenticity.\n\nALL text MUST be in Hebrew.\nRespond ONLY valid JSON no markdown:\n{\"total_score\":0,\"grade_label\":\"\",\"one_line\":\"\",\"sections\":{\"technical\":{\"score\":0,\"max\":20,\"notes\":\"\"},\"narrative\":{\"score\":0,\"max\":30,\"notes\":\"\"},\"personality\":{\"score\":0,\"max\":50,\"notes\":\"\"}},\"red_flags\":[],\"strengths\":[],\"improvements\":[],\"rewrite_suggestion\":\"\",\"personality_profile\":{\"honesty_humility\":{\"score\":0,\"max\":15,\"note\":\"\"},\"reflection\":{\"score\":0,\"max\":15,\"note\":\"\"},\"empathy\":{\"score\":0,\"max\":10,\"note\":\"\"},\"resilience\":{\"score\":0,\"max\":10,\"note\":\"\"}}}";

var MSYS="You are Martin, a tough interviewer for Israeli medical school admissions.\nRules: challenge the candidate, probe deeper, never accept surface answers.\nIf generic demand SPECIFIC example. If blaming others call it out. If no reasoning ask why.\nNever give scores. Natural Hebrew, 2-3 sentences max.\nChange topics after 3-4 exchanges. Occasionally throw ethical dilemmas.";

var QS=[
    {c:'bio',q:'ספר על מקרה שבו פגעת במישהו. איך הבנת? מה עשית? מה למדת?'},
    {c:'bio',q:'תאר תקשורת לא טובה עם אדם אחר. מה הקושי? איך פתרת?'},
    {c:'bio',q:'תאר משימה שנכשלת בה. מה הרגשת? איך התמודדת?'},
    {c:'bio',q:'ספר על ביקורת שקיבלת. איך הגבת? איך השפיעה?'},
    {c:'bio',q:'היכן התנדבת? מה פחות אהבת? איך התמודדת?'},
    {c:'bio',q:'מה מושך אותך ברפואה? דוגמאות מהחיים.'},
    {c:'vid',q:'תאר תקופה של רגשות שליליים. מה עבר עליך ואיך התמודדת?'},
    {c:'vid',q:'מישהו הגיב בחוסר פרופורציה. מה עשית?'},
    {c:'sit',q:'אתה רופא. מטופל כועס חיכה 3 שעות. מה תעשה?'},
    {c:'sit',q:'רופא בכיר טעה במינון. אומר לא להתערב. מה עכשיו?'},
    {c:'sit',q:'משפחה מבקשת שלא תספר למטופל בן 70 צלול על מצבו. הוא שואל. מה תעשה?'},
    {c:'dil',q:'מכשיר הנשמה אחד, שני חולים: צעיר 25 ומבוגר 78. איך תחליט?'},
    {c:'dil',q:'מטופל בן 17 משתמש בסמים, מבקש סודיות. ההורים שואלים. מה תעשה?'},
    {c:'dil',q:'מטופלת מבקשת הליך מותר בחוק שסותר את ערכיך. מה תעשה?'}
];
var CN={bio:'ביוגרפי',vid:'וידאו',sit:'סיטואציה',dil:'דילמה'};

function pj(t){try{return JSON.parse(t.replace(/```json|```/g,'').trim())}catch(e){return null}}
function fmt(s){var m=Math.floor(s/60),c=s%60;return(m<10?'0':'')+m+':'+(c<10?'0':'')+c}
function sC(s){return s>=80?'#16a34a':s>=60?'#ca8a04':'#dc2626'}

function Bar(p){
    var pct=Math.round((p.score/p.max)*100),c=sC(pct);
    return React.createElement('div',{style:{marginBottom:10}},[
        React.createElement('div',{key:'h',style:{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:600,marginBottom:3,color:'#475569'}},[
            React.createElement('span',{key:'l'},p.label),
            React.createElement('span',{key:'s',style:{color:c}},p.score+'/'+p.max)
        ]),
        React.createElement('div',{key:'bg',style:{height:6,borderRadius:3,background:'#e2e8f0',overflow:'hidden'}},
            React.createElement('div',{style:{height:'100%',width:pct+'%',background:c,borderRadius:3,transition:'width .6s'}})
        ),
        p.note?React.createElement('div',{key:'n',style:{fontSize:11,color:'#64748b',marginTop:3,lineHeight:1.5}},p.note):null
    ]);
}

function App(){
    var s=useState,u=useEffect,r=useRef;
    var _v=s('home'),view=_v[0],setView=_v[1];
    var _k=s(null),keys=_k[0],setKeys=_k[1];
    var _ke=s(null),kErr=_ke[0],setKErr=_ke[1];
    var _u=s('tzfat'),uni=_u[0],setUni=_u[1];
    var _tx=s(''),text=_tx[0],setText=_tx[1];
    var _ld=s(false),loading=_ld[0],setLoading=_ld[1];
    var _rs=s(null),results=_rs[0],setResults=_rs[1];
    var _tb=s('gemini'),tab=_tb[0],setTab=_tb[1];
    var _qi=s(null),qIdx=_qi[0],setQIdx=_qi[1];
    var _ch=s([]),chat=_ch[0],setChat=_ch[1];
    var _ci=s(''),ci=_ci[0],setCi=_ci[1];
    var _ml=s(false),mLd=_ml[0],setMLd=_ml[1];
    var _ti=s(0),timer=_ti[0],setTimer=_ti[1];
    var _to=s(false),tOn=_to[0],setTOn=_to[1];
    var _tm=s('up'),tMode=_tm[0],setTMode=_tm[1];
    var _rc=s(false),isRec=_rc[0],setIsRec=_rc[1];
    var _ro=s(null),recO=_ro[0],setRecO=_ro[1];
    var ceRef=r(null);

    u(function(){fetch('/api/keys').then(function(r){if(!r.ok)throw new Error('err');return r.json()}).then(function(d){setKeys(d)}).catch(function(e){setKErr(e.message)})},[]);
    u(function(){if(!tOn)return;var iv=setInterval(function(){setTimer(function(t){if(tMode==='down'&&t<=1){setTOn(false);return 0}return tMode==='up'?t+1:t-1})},1000);return function(){clearInterval(iv)}},[tOn,tMode]);
    u(function(){if(ceRef.current)ceRef.current.scrollIntoView({behavior:'smooth'})},[chat]);

    function togRec(target){
        if(isRec&&recO){recO.stop();setIsRec(false);setRecO(null);return}
        var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
        if(!SR){alert('השתמש בכרום.');return}
        var rc=new SR();rc.lang='he-IL';rc.continuous=true;rc.interimResults=false;
        rc.onresult=function(e){var f='';for(var i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)f+=e.results[i][0].transcript+' '}if(f){if(target==='chat')setCi(function(p){return p+' '+f});else setText(function(p){return p+' '+f})}};
        rc.onerror=function(){setIsRec(false);setRecO(null)};rc.onend=function(){setIsRec(false);setRecO(null)};
        rc.start();setIsRec(true);setRecO(rc);
    }

    function pickQ(){setQIdx(Math.floor(Math.random()*QS.length))}

    async function analyze(){
        if(text.length<20){alert('כתוב תשובה מלאה.');return}
        setLoading(true);setResults(null);
        try{
            var prompt='Institution: '+UNIS[uni].name+'\nLimit: '+UNIS[uni].limit+'\nActual: '+text.length+'\n\nAnswer:\n'+text;
            var promises=[];
            if(keys.GEMINI){promises.push(fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key='+keys.GEMINI,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:RUBRIC}]},contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.3}})}).then(function(r){return r.json()}).then(function(d){return{sys:'gemini',data:d}}).catch(function(){return{sys:'gemini',data:null}}))}
            if(keys.CLAUDE){promises.push(fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt,system:RUBRIC})}).then(function(r){return r.json()}).then(function(d){return{sys:'claude',data:d}}).catch(function(){return{sys:'claude',data:null}}))}
            if(keys.GPT){promises.push(fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+keys.GPT},body:JSON.stringify({model:'gpt-4o',temperature:0.3,messages:[{role:'system',content:RUBRIC},{role:'user',content:prompt}]})}).then(function(r){return r.json()}).then(function(d){return{sys:'gpt',data:d}}).catch(function(){return{sys:'gpt',data:null}}))}
            var raw=await Promise.allSettled(promises);
            var parsed={gemini:null,claude:null,gpt:null};
            raw.forEach(function(r){if(r.status!=='fulfilled'||!r.value.data)return;var v=r.value;try{if(v.sys==='gemini')parsed.gemini=pj(v.data.candidates[0].content.parts[0].text);if(v.sys==='claude'){var t=v.data.content?v.data.content[0].text:(v.data.text||'');parsed.claude=pj(t)}if(v.sys==='gpt')parsed.gpt=pj(v.data.choices[0].message.content)}catch(e){}});
            setResults(parsed);if(parsed.gemini)setTab('gemini');else if(parsed.claude)setTab('claude');else if(parsed.gpt)setTab('gpt');
        }catch(e){alert('שגיאה: '+e.message)}finally{setLoading(false)}
    }

    async function martinSend(){
        if(!ci.trim()||!keys.GEMINI)return;
        var nc=chat.concat([{role:'user',text:ci}]);setChat(nc);setCi('');setMLd(true);
        try{
            var hist=nc.map(function(m){return m.role==='user'?'Candidate: '+m.text:'Martin: '+m.text}).join('\n');
            var res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key='+keys.GEMINI,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:MSYS+'\nInstitution: '+UNIS[uni].name}]},contents:[{parts:[{text:'Conversation:\n'+hist+'\n\nRespond as Martin (2-3 sentences Hebrew):'}]}],generationConfig:{temperature:0.7,maxOutputTokens:200}})});
            var data=await res.json();var reply=data.candidates[0].content.parts[0].text;
            setChat(nc.concat([{role:'martin',text:reply}]));
            if('speechSynthesis' in window){window.speechSynthesis.cancel();var ut=new SpeechSynthesisUtterance(reply);ut.lang='he-IL';ut.rate=1.05;window.speechSynthesis.speak(ut)}
        }catch(e){setChat(nc.concat([{role:'martin',text:'שגיאת תקשורת. נסה שוב.'}]))}finally{setMLd(false)}
    }

    function startMartin(){var q=QS[Math.floor(Math.random()*QS.length)];setChat([{role:'martin',text:'שלום. אני מרטין, מראיין במיוני רפואה. נתחיל:\n\n'+q.q}]);setCi('');setView('martin')}

    if(kErr)return <div class="flex items-center justify-center min-h-screen"><div class="bg-red-50 border border-red-200 rounded-2xl p-8 max-w-md text-center"><div class="text-3xl mb-3">&#9888;</div><div class="font-bold text-red-700 mb-2">שגיאה בטעינת מפתחות</div><div class="text-sm text-red-500">וודא שקובץ /api/keys קיים ומוגדרים Environment Variables ב-Vercel</div></div></div>;
    if(!keys)return <div class="flex flex-col items-center justify-center min-h-screen gap-3"><span class="ld" style={{width:32,height:32}}></span><div class="text-slate-400 font-bold text-sm">מתחבר לכספת...</div></div>;

    var uI=UNIS[uni];

    // Result Card Component
    function RC({data,name}){
        if(!data)return <div class="p-8 bg-white rounded-2xl border-2 border-dashed border-slate-200 text-center"><p class="text-slate-400 font-bold">{name}</p><p class="text-xs text-slate-300 mt-1">לא זמין</p></div>;
        var sc=data.total_score,c=sC(sc);
        return(<div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm fi" style={{borderTopColor:c,borderTopWidth:3}}>
            <div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-3">
                <div><div class="text-3xl font-black" style={{color:c}}>{sc}<span class="text-sm font-normal text-slate-400"> / 100</span></div><div class="text-sm font-bold" style={{color:c}}>{data.grade_label}</div></div>
                <div class="bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-xs font-bold">{name}</div>
            </div>
            <p class="text-sm text-slate-600 italic mb-4 leading-relaxed">"{data.one_line}"</p>
            <Bar label="מסגרת טכנית" score={data.sections?.technical?.score||0} max={20} note={data.sections?.technical?.notes}/>
            <Bar label="מבנה נרטיבי STAR" score={data.sections?.narrative?.score||0} max={30} note={data.sections?.narrative?.notes}/>
            <Bar label="פרופיל HEXACO" score={data.sections?.personality?.score||0} max={50} note={data.sections?.personality?.notes}/>
            {data.personality_profile&&<div class="mt-4 pt-3 border-t border-slate-100"><div class="text-xs font-bold text-slate-500 mb-2">פירוט HEXACO</div>
                <Bar label="כנות וענווה" score={data.personality_profile.honesty_humility?.score||0} max={15} note={data.personality_profile.honesty_humility?.note}/>
                <Bar label="רפלקציה" score={data.personality_profile.reflection?.score||0} max={15} note={data.personality_profile.reflection?.note}/>
                <Bar label="אמפתיה" score={data.personality_profile.empathy?.score||0} max={10} note={data.personality_profile.empathy?.note}/>
                <Bar label="חוסן" score={data.personality_profile.resilience?.score||0} max={10} note={data.personality_profile.resilience?.note}/>
            </div>}
            {data.red_flags&&data.red_flags.length>0&&<div class="mt-3 p-3 bg-red-50 rounded-xl border border-red-100"><div class="text-xs font-bold text-red-700 mb-1">דגלים אדומים</div>{data.red_flags.map(function(f,i){return <div key={i} class="text-xs text-red-600">- {f}</div>})}</div>}
            {data.strengths&&data.strengths.length>0&&<div class="mt-3 p-3 bg-green-50 rounded-xl border border-green-100"><div class="text-xs font-bold text-green-700 mb-1">חוזקות</div>{data.strengths.map(function(s,i){return <div key={i} class="text-xs text-green-600">- {s}</div>})}</div>}
            {data.improvements&&data.improvements.length>0&&<div class="mt-3 p-3 bg-blue-50 rounded-xl border border-blue-100"><div class="text-xs font-bold text-blue-700 mb-1">מה לשפר</div>{data.improvements.map(function(m,i){return <div key={i} class="text-xs text-blue-600">{(i+1)+'. '+m}</div>})}</div>}
            {data.rewrite_suggestion&&<div class="mt-3 p-3 bg-orange-50 rounded-xl border border-orange-100"><div class="text-xs font-bold text-orange-800 mb-1">הצעת ניסוח</div><p class="text-xs text-orange-700 leading-relaxed">{data.rewrite_suggestion}</p></div>}
        </div>);
    }

    return(<div class="min-h-screen flex flex-col">
        <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onClick={function(){setView('home');setTOn(false)}}>
                <div class="w-8 h-8 bg-orange-800 text-white rounded-lg flex items-center justify-center font-black text-base">M</div>
                <h1 class="text-lg font-black text-slate-800">Med-Test <span class="text-orange-700">Pro</span></h1>
            </div>
            {view!=='home'&&<select value={uni} onChange={function(e){setUni(e.target.value)}} class="bg-slate-100 border border-slate-200 text-xs font-bold py-2 px-3 rounded-full cursor-pointer">{Object.entries(UNIS).map(function(e){return <option key={e[0]} value={e[0]}>{e[1].name}</option>})}</select>}
        </header>

        <main class="flex-1 p-4 md:p-6 max-w-6xl mx-auto w-full">

            {view==='home'&&<div class="max-w-3xl mx-auto mt-8 fi">
                <div class="text-center mb-10"><h2 class="text-3xl md:text-4xl font-black text-slate-800 mb-3">מוכן למיונים?</h2><p class="text-slate-500">בחר סגנון תרגול</p></div>
                <div class="grid md:grid-cols-3 gap-5">
                    <button onClick={function(){setView('multi');setText('');setResults(null);pickQ()}} class="bg-white p-8 rounded-3xl border-2 border-slate-200 hover:border-orange-500 hover:shadow-lg transition-all text-right group">
                        <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">&#9997;&#65039;</div>
                        <h3 class="text-lg font-bold text-slate-800 mb-2">תרגול כתוב</h3>
                        <p class="text-xs text-slate-500">Gemini 3.1 Pro + Claude Opus 4.6 + GPT-4o</p>
                    </button>
                    <button onClick={startMartin} class="bg-white p-8 rounded-3xl border-2 border-slate-200 hover:border-orange-500 hover:shadow-lg transition-all text-right group">
                        <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">&#128483;&#65039;</div>
                        <h3 class="text-lg font-bold text-slate-800 mb-2">ראיון חי (מרטין)</h3>
                        <p class="text-xs text-slate-500">מראיין AI שמתקיל ומדבר בחזרה</p>
                    </button>
                    <button onClick={function(){setView('timed');setText('');setTimer(0);setTOn(false);setResults(null);pickQ()}} class="bg-white p-8 rounded-3xl border-2 border-slate-200 hover:border-orange-500 hover:shadow-lg transition-all text-right group">
                        <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">&#9201;</div>
                        <h3 class="text-lg font-bold text-slate-800 mb-2">מבחן על השעון</h3>
                        <p class="text-xs text-slate-500">כתיבה + הקלטה תחת לחץ זמן</p>
                    </button>
                </div>
            </div>}

            {(view==='multi'||view==='timed')&&<div class="flex flex-col lg:flex-row gap-6 fi" style={{minHeight:'calc(100vh - 140px)'}}>
                <div class="w-full lg:w-1/2 flex flex-col gap-4">
                    {view==='timed'&&<div class="bg-slate-800 text-white p-5 rounded-2xl flex justify-between items-center shadow-lg">
                        <div><div class="text-xs text-slate-400 font-bold mb-1">{tMode==='down'?'זמן נותר':'זמן שעבר'}</div><div class={'text-3xl font-mono font-black '+(tMode==='down'&&timer<30?'text-red-400':'')}>{fmt(timer)}</div></div>
                        <div class="flex gap-2 flex-wrap">
                            {!tOn?<Fragment><button onClick={function(){setTMode('up');setTimer(0);setTOn(true)}} class="bg-orange-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-orange-500">ספירה</button><button onClick={function(){setTMode('down');setTimer(120);setTOn(true)}} class="bg-slate-600 px-3 py-2 rounded-xl text-xs font-bold">2 דק</button><button onClick={function(){setTMode('down');setTimer(300);setTOn(true)}} class="bg-slate-600 px-3 py-2 rounded-xl text-xs font-bold">5 דק</button><button onClick={function(){setTMode('down');setTimer(600);setTOn(true)}} class="bg-slate-600 px-3 py-2 rounded-xl text-xs font-bold">10 דק</button></Fragment>:<Fragment><button onClick={function(){setTOn(false)}} class="bg-yellow-600 px-4 py-2 rounded-xl text-sm font-bold">עצור</button><button onClick={function(){setTOn(false);setTimer(0)}} class="bg-red-600 px-4 py-2 rounded-xl text-sm font-bold">אפס</button></Fragment>}
                        </div>
                    </div>}
                    {qIdx!==null&&<div class="bg-orange-50 border border-orange-200 rounded-2xl p-4 flex items-start gap-3">
                        <span class="px-2 py-1 rounded-lg text-xs font-bold text-white bg-orange-600">{CN[QS[qIdx].c]}</span>
                        <p class="text-sm text-orange-900 leading-relaxed flex-1">{QS[qIdx].q}</p>
                        <button onClick={pickQ} class="text-xs text-orange-500 font-bold hover:text-orange-700 shrink-0">אחרת</button>
                    </div>}
                    <div class="flex-1 flex flex-col bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                        <div class="px-4 py-3 border-b bg-slate-50 flex justify-between items-center">
                            <span class="text-xs font-bold text-slate-400">כתיבה / תמלול</span>
                            <span class={'text-xs font-bold '+(text.length>uI.limit?'text-red-500':'text-slate-400')}>{text.length} / {uI.limit}{text.length>uI.limit&&' ⚠️'}</span>
                        </div>
                        <textarea class="flex-1 w-full p-5 outline-none text-slate-700 text-base leading-relaxed resize-none sc" style={{minHeight:250}} placeholder="הקלד או הדבק את התשובה שלך..." value={text} onChange={function(e){setText(e.target.value)}}></textarea>
                        <div class="px-4 py-3 bg-slate-50 border-t flex gap-3">
                            <button onClick={function(){togRec('text')}} class={'w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 transition-all '+(isRec?'bg-red-500 text-white rp':'bg-slate-200 text-slate-600 hover:bg-slate-300')}>&#127897;</button>
                            <button onClick={analyze} disabled={loading} class={'flex-1 py-3 rounded-2xl font-bold text-white transition-all '+(loading?'bg-slate-400':'bg-orange-800 hover:bg-orange-900 active:scale-95')}>
                                {loading?<span class="flex items-center justify-center gap-2"><span class="ld"></span> בודק...</span>:'שלח לניתוח'}
                            </button>
                        </div>
                    </div>
                </div>
                <div class="w-full lg:w-1/2 overflow-y-auto sc pb-10">
                    {!results&&!loading&&<div class="h-64 flex flex-col items-center justify-center text-slate-300"><div class="text-5xl mb-3">&#128202;</div><div class="font-bold">הניתוח יופיע כאן</div></div>}
                    {results&&<div class="space-y-4 fi">
                        <div class="flex lg:hidden p-1 bg-slate-200 rounded-xl gap-1 mb-2">
                            {['gemini','claude','gpt'].map(function(m){return <button key={m} onClick={function(){setTab(m)}} class={'flex-1 py-2 text-xs font-bold rounded-lg '+(tab===m?'bg-white shadow text-orange-800':'text-slate-500')}>{m==='gemini'?'Gemini 3.1':m==='claude'?'Opus 4.6':'GPT-4o'}</button>})}
                        </div>
                        <div class={'lg:block '+(tab==='gemini'?'block':'hidden')}><RC data={results.gemini} name="Gemini 3.1 Pro"/></div>
                        <div class={'lg:block mt-4 '+(tab==='claude'?'block':'hidden')}><RC data={results.claude} name="Claude Opus 4.6"/></div>
                        <div class={'lg:block mt-4 '+(tab==='gpt'?'block':'hidden')}><RC data={results.gpt} name="GPT-4o"/></div>
                    </div>}
                </div>
            </div>}

            {view==='martin'&&<div class="max-w-2xl mx-auto flex flex-col bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-lg fi" style={{height:'calc(100vh - 140px)'}}>
                <div class="bg-orange-50 p-4 border-b flex items-center gap-3">
                    <div class="w-10 h-10 bg-orange-200 rounded-full flex items-center justify-center text-xl shrink-0">&#128104;&#8205;&#9877;&#65039;</div>
                    <div><div class="font-bold text-orange-900">מרטין הבוחן</div><div class="text-xs text-orange-600">{UNIS[uni].name} &middot; Gemini 3.1 Pro</div></div>
                </div>
                <div class="flex-1 overflow-y-auto p-5 space-y-4 bg-slate-50 sc">
                    {chat.map(function(msg,i){return <div key={i} class={'flex '+(msg.role==='user'?'justify-end':'justify-start')}><div class={'max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed shadow-sm '+(msg.role==='user'?'bg-orange-800 text-white rounded-tl-sm':'bg-white text-slate-700 border border-slate-200 rounded-tr-sm')}>{msg.text}</div></div>})}
                    {mLd&&<div class="flex justify-start"><div class="p-4 bg-white border border-slate-200 rounded-2xl rounded-tr-sm"><span class="ld"></span></div></div>}
                    <div ref={ceRef}/>
                </div>
                <div class="p-4 bg-white border-t flex gap-3 items-end">
                    <button onClick={function(){togRec('chat')}} class={'w-12 h-12 rounded-xl flex items-center justify-center shrink-0 transition-all '+(isRec?'bg-red-500 text-white rp':'bg-slate-200 text-slate-600 hover:bg-slate-300')}>&#127897;</button>
                    <textarea class="flex-1 min-h-[48px] max-h-28 p-3 bg-slate-100 rounded-xl resize-none text-sm sc outline-none" placeholder="דבר או כתוב למרטין..." value={ci} onChange={function(e){setCi(e.target.value)}} onKeyDown={function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();martinSend()}}}></textarea>
                    <button onClick={martinSend} disabled={mLd||!ci.trim()} class="w-12 h-12 bg-orange-800 text-white rounded-xl flex items-center justify-center hover:bg-orange-900 disabled:opacity-40 shrink-0 text-lg font-bold">&#8593;</button>
                </div>
            </div>}

        </main>
    </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
