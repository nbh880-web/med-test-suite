<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med-Test Pro | Simulator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #f8fafc; color: #0f172a; overflow-x: hidden; }
        .watermark { position: fixed; bottom: 12px; left: 12px; opacity: 0.15; font-size: 11px; z-index: 0; pointer-events: none; font-weight: 700; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loader { border: 3px solid #f1f5f9; border-top: 3px solid #b44a2d; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .recording-pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="watermark">© זכויות יוצרים לניתאי מלכה</div>

    <script type="text/babel">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const UNIVERSITIES = {
            mor: { name: 'מור / מרק"ם', desc: 'שאלון מחולק לסעיפים, התמקדות בקונפליקטים.', limit: 750 },
            bgu: { name: 'בן גוריון', desc: 'שאלון בלוק פתוח, התמקדות בעומק ומניעים.', limit: 1200 },
            tzfat: { name: 'צפת', desc: 'מחולק לסעיפים, פורמט קצר וקולע.', limit: 850 }
        };

        function App() {
            const [keys, setKeys] = React.useState(null);
            const [db, setDb] = React.useState(null);
            const [keysError, setKeysError] = React.useState(false);

            const [view, setView] = React.useState('home'); // home, multi, timed, martin
            const [uni, setUni] = React.useState('mor');
            
            // Multi-AI / Timed State
            const [text, setText] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [results, setResults] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('gemini');

            const [timer, setTimer] = React.useState(180);
            const [timerActive, setTimerActive] = React.useState(false);
            const [isRecording, setIsRecording] = React.useState(false);
            const [recognition, setRecognition] = React.useState(null);

            // Martin State
            const [chat, setChat] = React.useState([{role: 'martin', text: 'שלום ניתאי. אני מרטין ואני אראיין אותך היום. בוא נתחיל - ספר לי על מקרה שבו היית צריך לשנות את דעתך בעקבות ביקורת שקיבלת.'}]);
            const [chatInput, setChatInput] = React.useState('');
            const [martinLoading, setMartinLoading] = React.useState(false);

            // 1. משיכת המפתחות מהכספת בטעינה
            React.useEffect(() => {
                fetch('/api/keys')
                    .then(res => {
                        if(!res.ok) throw new Error("Network response was not ok");
                        return res.json();
                    })
                    .then(data => {
                        setKeys(data);
                        if(data.FIREBASE) {
                            try {
                                const app = initializeApp({ apiKey: data.FIREBASE, projectId: "med-test-nitai" });
                                setDb(getFirestore(app));
                            } catch(e) { console.warn("Firebase Init Error", e); }
                        }
                    })
                    .catch((err) => {
                        console.error("Keys fetch error:", err);
                        setKeysError(true);
                    });
            }, []);

            // 2. ניהול הטיימר
            React.useEffect(() => {
                let interval = null;
                if (timerActive && timer > 0) {
                    interval = setInterval(() => setTimer(timer - 1), 1000);
                } else if (timer === 0) {
                    setTimerActive(false);
                    if (isRecording && recognition) { recognition.stop(); setIsRecording(false); }
                }
                return () => clearInterval(interval);
            }, [timerActive, timer, isRecording, recognition]);

            if (keysError) return <div class="text-center mt-20 p-6 bg-red-50 rounded-xl font-bold text-red-600 max-w-md mx-auto">שגיאה במשיכת המפתחות מהכספת. וודא שקובץ `api/keys.js` קיים והעלת אותו ל-GitHub.</div>;
            if (!keys) return <div class="flex flex-col items-center justify-center min-h-screen"><span class="loader border-orange-200 border-top-orange-800 w-12 h-12 mb-4"></span><p class="font-bold text-slate-500">מתחבר לכספת המאובטחת...</p></div>;

            // --- Multi-AI Logic ---
            const getSysPrompt = () => `אתה בוחן קפדני במיוני רפואה. המסלול: ${UNIVERSITIES[uni].name}. מגבלת תווים רצויה: ${UNIVERSITIES[uni].limit}.
Evaluate strictly based on this Rubric (0-100). Do not flatter.
Part A: Technical (20) - Character limit adherence, Completeness.
Part B: Narrative (30) - STAR Model Adherence (Situation, Task, Action, Result), Rationale, Clarity.
Part C: Personality HEXACO (50) - Honesty/Humility (15), Reflection (15), Empathy (10), Resilience (10).
Red flags = 0 score: blaming others, insensitivity, defensiveness.
ALL text MUST be in Hebrew. Respond ONLY with a valid JSON:
{"total_score":0,"grade_label":"מצוין / סביר / טעון שיפור","one_line":"","sections":{"technical":{"score":0,"max":20,"notes":""},"narrative":{"score":0,"max":30,"notes":""},"personality":{"score":0,"max":50,"notes":""}},"red_flags":[],"strengths":[],"improvements":[],"rewrite_suggestion":"","personality_profile":{"honesty_humility":{"score":0,"max":15,"note":""},"reflection":{"score":0,"max":15,"note":""},"empathy":{"score":0,"max":10,"note":""},"resilience":{"score":0,"max":10,"note":""}}}`;

            const handleAnalyze = async () => {
                if (text.length < 20) return alert("אנא כתוב תשובה מלאה קודם.");
                setLoading(true); setResults(null);
                try {
                    if(db) await addDoc(collection(db, "evaluations"), { content: text, type: 'multi-ai', uni: uni, timestamp: serverTimestamp() });
                    const prompt = `תשובה לבדיקה (אורך: ${text.length} תווים):\n${text}`;
                    
                    const fetchModel = async (url, body, headers={}) => {
                        const res = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json', ...headers}, body: JSON.stringify(body) });
                        return res.json();
                    };

                    const promises = [];
                    if(keys.GEMINI) promises.push(fetchModel(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${keys.GEMINI}`, { contents: [{ parts: [{ text: getSysPrompt() + "\n\n" + prompt }] }] }).then(d => ({sys: 'gemini', data: d})));
                    if(keys.CLAUDE) promises.push(fetchModel('https://api.anthropic.com/v1/messages', { model: "claude-3-haiku-20240307", max_tokens: 1000, system: getSysPrompt(), messages: [{role: "user", content: prompt}] }, { 'x-api-key': keys.CLAUDE, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' }).then(d => ({sys: 'claude', data: d})));
                    if(keys.GPT) promises.push(fetchModel('https://api.openai.com/v1/chat/completions', { model: "gpt-4o-mini", messages: [{role: "system", content: getSysPrompt()}, {role: "user", content: prompt}] }, { 'Authorization': `Bearer ${keys.GPT}` }).then(d => ({sys: 'gpt', data: d})));

                    const resultsRaw = await Promise.allSettled(promises);
                    const parsed = { gemini: null, claude: null, gpt: null };
                    
                    const parseSafe = (rawText) => { try { return JSON.parse(rawText.replace(/```json|```/g, "").trim()); } catch(e) { return null; } };

                    resultsRaw.forEach(r => {
                        if(r.status === 'fulfilled') {
                            if(r.value.sys === 'gemini') parsed.gemini = parseSafe(r.value.data.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
                            if(r.value.sys === 'claude') parsed.claude = parseSafe(r.value.data.content?.[0]?.text || "{}");
                            if(r.value.sys === 'gpt') parsed.gpt = parseSafe(r.value.data.choices?.[0]?.message?.content || "{}");
                        }
                    });
                    setResults(parsed);
                } catch (e) { alert("שגיאה בתקשורת עם המודלים."); } 
                finally { setLoading(false); }
            };

            // --- Martin Live Logic ---
            const handleMartinSend = async () => {
                if(!chatInput.trim() || !keys.GEMINI) return;
                const newChat = [...chat, {role: 'user', text: chatInput}];
                setChat(newChat); setChatInput(''); setMartinLoading(true);

                try {
                    const prompt = `אתה מרטין, מראיין קשוח למיוני רפואה. מסלול: ${UNIVERSITIES[uni].name}. 
המועמד ענה: "${chatInput}". 
אל תיתן לו ציון. תאתגר אותו, תשאל שאלת המשך קשה, תבקש דוגמה, או תגיד שהתשובה כללית ותדרוש פירוט. תהיה ענייני, חד, בשפה עברית טבעית (עד 3 משפטים).`;
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${keys.GEMINI}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    const reply = data.candidates[0].content.parts[0].text;
                    setChat([...newChat, {role: 'martin', text: reply}]);
                    
                    if ('speechSynthesis' in window) {
                        const utterance = new SpeechSynthesisUtterance(reply);
                        utterance.lang = 'he-IL';
                        window.speechSynthesis.speak(utterance);
                    }
                } catch(e) { setChat([...newChat, {role: 'martin', text: 'שגיאת תקשורת, נסה שוב.'}]); }
                finally { setMartinLoading(false); }
            };

            // --- Audio Recording Logic ---
            const toggleRecording = () => {
                if (isRecording && recognition) {
                    recognition.stop();
                    setIsRecording(false);
                } else {
                    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (!SR) return alert("הדפדפן לא תומך בהקלטה. נסה בכרום.");
                    const rec = new SR();
                    rec.lang = 'he-IL'; rec.continuous = true; rec.interimResults = true;
                    rec.onresult = (e) => {
                        let final = '';
                        for (let i = e.resultIndex; i < e.results.length; i++) {
                            if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
                        }
                        if(final) {
                            if(view === 'multi' || view === 'timed') setText(prev => prev + ' ' + final);
                            if(view === 'martin') setChatInput(prev => prev + ' ' + final);
                        }
                    };
                    rec.start();
                    setRecognition(rec);
                    setIsRecording(true);
                }
            };

            // --- UI Helpers ---
            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const renderScore = (label, score, max) => (
                <div class="mb-2">
                    <div class="flex justify-between text-xs font-bold mb-1 text-slate-600"><span>{label}</span><span>{score}/{max}</span></div>
                    <div class="h-1.5 bg-slate-200 rounded-full"><div class="h-full bg-orange-700 rounded-full transition-all" style={{width: `${(score/max)*100}%`}}></div></div>
                </div>
            );

            const renderResultCard = (data, name) => {
                if(!data) return <div class="p-6 bg-white rounded-2xl border border-slate-200 text-center text-slate-400 font-bold">מודל {name} לא זמין או לא הוגדר מפתח בכספת</div>;
                return (
                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-5">
                        <div class="flex items-center justify-between border-b pb-4">
                            <div>
                                <h3 class="font-black text-xl text-slate-800">{data.total_score} <span class="text-sm font-normal text-slate-500">/ 100</span></h3>
                                <div class="text-sm font-bold text-orange-700">{data.grade_label}</div>
                            </div>
                            <div class="text-xs bg-slate-100 text-slate-500 px-3 py-1 rounded-full font-bold uppercase tracking-wider">{name}</div>
                        </div>
                        <p class="text-sm text-slate-600 italic leading-relaxed">"{data.one_line}"</p>
                        
                        <div class="space-y-3 pt-2">
                            {renderScore("טכני (תווים ומבנה)", data.sections?.technical?.score, 20)}
                            {renderScore("נרטיב ומודל STAR", data.sections?.narrative?.score, 30)}
                            {renderScore("פרופיל HEXACO", data.sections?.personality?.score, 50)}
                        </div>

                        {data.rewrite_suggestion && (
                            <div class="mt-4 p-4 bg-orange-50 rounded-xl border border-orange-100">
                                <h4 class="text-xs font-bold text-orange-900 mb-2">💡 הצעת שכתוב</h4>
                                <p class="text-[13px] text-orange-800 leading-relaxed">{data.rewrite_suggestion}</p>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div class="min-h-screen flex flex-col">
                    <header class="glass sticky top-0 z-50 border-b border-slate-200 p-4 flex justify-between items-center shadow-sm">
                        <div class="flex items-center gap-3 cursor-pointer" onClick={() => {setView('home'); setTimerActive(false);}}>
                            <div class="w-8 h-8 bg-orange-800 text-white rounded-lg flex items-center justify-center font-black text-lg">M</div>
                            <h1 class="text-xl font-black text-slate-800 tracking-tight">Med-Test <span class="text-orange-700">Pro</span></h1>
                        </div>
                        {view !== 'home' && (
                            <select value={uni} onChange={e=>setUni(e.target.value)} class="bg-slate-100 border-none text-xs font-bold py-2 px-4 rounded-full focus:ring-0 cursor-pointer">
                                {Object.entries(UNIVERSITIES).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                            </select>
                        )}
                    </header>

                    <main class="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full">
                        {/* --- HOME VIEW --- */}
                        {view === 'home' && (
                            <div class="max-w-3xl mx-auto mt-10 space-y-6 animate-in slide-in-from-bottom-4 duration-500">
                                <div class="text-center mb-12">
                                    <h2 class="text-4xl font-black text-slate-800 mb-4">מוכן למיונים?</h2>
                                    <p class="text-slate-500 text-lg">בחר את סגנון התרגול שלך להיום.</p>
                                </div>
                                <div class="grid md:grid-cols-3 gap-6">
                                    <button onClick={()=>{setView('multi'); setText(''); setResults(null);}} class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:border-orange-500 hover:shadow-md transition-all text-right group">
                                        <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">✍️</div>
                                        <h3 class="text-xl font-bold text-slate-800 mb-2">תרגול כתוב</h3>
                                        <p class="text-sm text-slate-500">בדיקה מקיפה במקביל מול 3 מודלי AI (Gemini, Claude, GPT).</p>
                                    </button>
                                    <button onClick={()=>{setView('martin'); setChatInput('');}} class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:border-orange-500 hover:shadow-md transition-all text-right group">
                                        <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">🗣️</div>
                                        <h3 class="text-xl font-bold text-slate-800 mb-2">ראיון חי (מרטין)</h3>
                                        <p class="text-sm text-slate-500">סימולציית צ'אט או הקלטה מול מראיין שמתקיל בזמן אמת.</p>
                                    </button>
                                    <button onClick={()=>{setView('timed'); setText(''); setTimer(180); setTimerActive(false);}} class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:border-orange-500 hover:shadow-md transition-all text-right group">
                                        <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">⏱️</div>
                                        <h3 class="text-xl font-bold text-slate-800 mb-2">מבחן על השעון</h3>
                                        <p class="text-sm text-slate-500">הקלטה קולית תחת לחץ זמן לדימוי תחנות ראיון ווידאו.</p>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* --- MULTI-AI / TIMED VIEW --- */}
                        {(view === 'multi' || view === 'timed') && (
                            <div class="flex flex-col md:flex-row gap-8 h-[calc(100vh-120px)]">
                                {/* Left Side - Workspace */}
                                <div class="w-full md:w-1/2 flex flex-col space-y-4">
                                    {view === 'timed' && (
                                        <div class="bg-slate-800 text-white p-6 rounded-3xl flex justify-between items-center shadow-lg">
                                            <div>
                                                <div class="text-sm text-slate-400 font-bold mb-1">זמן נותר</div>
                                                <div class={`text-4xl font-mono font-black ${timer <= 30 ? 'text-red-400' : ''}`}>{formatTime(timer)}</div>
                                            </div>
                                            <div class="flex gap-2">
                                                <button onClick={()=>{setTimerActive(true); if(!isRecording) toggleRecording();}} class="bg-orange-600 px-6 py-3 rounded-xl font-bold hover:bg-orange-500 transition">התחל</button>
                                                <button onClick={()=>{setTimerActive(false); if(isRecording) toggleRecording();}} class="bg-slate-600 px-4 py-3 rounded-xl font-bold hover:bg-slate-500 transition">עצור</button>
                                            </div>
                                        </div>
                                    )}

                                    <div class="flex-1 relative flex flex-col bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                                        <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                                            <span class="text-xs font-bold text-slate-500 tracking-widest uppercase">אזור כתיבה / תמלול</span>
                                            <span class={`text-xs font-bold ${text.length > UNIVERSITIES[uni].limit ? 'text-red-500' : 'text-slate-400'}`}>
                                                {text.length} / {UNIVERSITIES[uni].limit} תווים
                                            </span>
                                        </div>
                                        <textarea 
                                            class="flex-1 w-full p-6 outline-none text-slate-700 text-lg leading-relaxed resize-none custom-scrollbar"
                                            placeholder="הדבק או הקלד את השחזור שלך כאן..."
                                            value={text} onChange={e=>setText(e.target.value)}
                                        ></textarea>
                                        <div class="p-4 bg-slate-50 border-t flex gap-3">
                                            <button onClick={toggleRecording} class={`flex items-center justify-center w-12 h-12 rounded-full transition-all shrink-0 ${isRecording ? 'bg-red-500 text-white recording-pulse' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>
                                                🎤
                                            </button>
                                            <button onClick={handleAnalyze} disabled={loading} class={`flex-1 rounded-2xl font-bold text-white transition-all shadow-md ${loading ? 'bg-slate-400' : 'bg-orange-800 hover:bg-orange-900 active:scale-95'}`}>
                                                {loading ? <span class="flex items-center justify-center gap-2"><span class="loader"></span> בוחן תשובה...</span> : 'שלח לניתוח משולש'}
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* Right Side - Results (Desktop Split) */}
                                <div class="w-full md:w-1/2 overflow-y-auto custom-scrollbar pr-2 pb-10">
                                    {!results && !loading && (
                                        <div class="h-full flex flex-col items-center justify-center text-slate-300 space-y-4">
                                            <div class="text-6xl">📊</div>
                                            <div class="text-lg font-bold">הניתוח יופיע כאן</div>
                                        </div>
                                    )}
                                    {results && (
                                        <div class="space-y-6 animate-in slide-in-from-right duration-500">
                                            {/* Mobile Tabs */}
                                            <div class="md:hidden flex p-1 bg-slate-200 rounded-xl gap-1 mb-4">
                                                {['gemini', 'claude', 'gpt'].map(m => (
                                                    <button key={m} onClick={()=>setActiveTab(m)} class={`flex-1 py-2 text-xs font-bold rounded-lg uppercase ${activeTab===m ? 'bg-white shadow text-orange-800' : 'text-slate-500'}`}>{m}</button>
                                                ))}
                                            </div>
                                            
                                            {/* Desktop List / Mobile Selected */}
                                            <div class="space-y-6">
                                                <div class={activeTab==='gemini' ? 'block' : 'hidden md:block'}>{renderResultCard(results.gemini, 'Gemini 1.5')}</div>
                                                <div class={activeTab==='claude' ? 'block' : 'hidden md:block'}>{renderResultCard(results.claude, 'Claude 3')}</div>
                                                <div class={activeTab==='gpt' ? 'block' : 'hidden md:block'}>{renderResultCard(results.gpt, 'GPT-4')}</div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* --- MARTIN LIVE VIEW --- */}
                        {view === 'martin' && (
                            <div class="max-w-2xl mx-auto h-[calc(100vh-140px)] flex flex-col bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                                <div class="p-4 border-b bg-orange-50 flex items-center gap-4">
                                    <div class="w-10 h-10 bg-orange-200 rounded-full flex items-center justify-center text-xl shrink-0">👨‍⚕️</div>
                                    <div>
                                        <h2 class="font-bold text-orange-900">מרטין הבוחן</h2>
                                        <p class="text-xs text-orange-700">סימולציה: {UNIVERSITIES[uni].name}</p>
                                    </div>
                                </div>
                                
                                <div class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar bg-slate-50">
                                    {chat.map((msg, i) => (
                                        <div key={i} class={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div class={`max-w-[80%] p-4 rounded-2xl text-sm leading-relaxed shadow-sm ${msg.role === 'user' ? 'bg-orange-800 text-white rounded-tl-none' : 'bg-white text-slate-700 border border-slate-200 rounded-tr-none'}`}>
                                                {msg.text}
                                            </div>
                                        </div>
                                    ))}
                                    {martinLoading && (
                                        <div class="flex justify-start"><div class="max-w-[80%] p-4 bg-white border border-slate-200 rounded-2xl rounded-tr-none"><span class="loader border-slate-300 border-top-slate-600"></span></div></div>
                                    )}
                                </div>

                                <div class="p-4 bg-white border-t flex gap-3 items-end">
                                    <button onClick={toggleRecording} class={`flex items-center justify-center w-12 h-12 rounded-full shrink-0 transition-all ${isRecording ? 'bg-red-500 text-white recording-pulse' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>
                                        🎤
                                    </button>
                                    <textarea 
                                        class="flex-1 min-h-[48px] max-h-32 p-3 bg-slate-100 rounded-2xl outline-none resize-none text-sm custom-scrollbar"
                                        placeholder="הקלד או דבר אל מרטין..."
                                        value={chatInput} onChange={e=>setChatInput(e.target.value)}
                                        onKeyDown={e => {if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleMartinSend(); }}}
                                    ></textarea>
                                    <button onClick={handleMartinSend} disabled={martinLoading || !chatInput.trim()} class="w-12 h-12 bg-orange-800 text-white rounded-full flex items-center justify-center hover:bg-orange-900 disabled:opacity-50 shrink-0">
                                        ↑
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
