<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med-Test Pro | Ultimate</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Heebo',sans-serif;background:#f8fafc;color:#0f172a}
        .wm{position:fixed;bottom:10px;left:10px;opacity:.12;font-size:10px;pointer-events:none;font-weight:700}
        .ld{border:3px solid #e2e8f0;border-top:3px solid #c2410c;border-radius:50%;width:20px;height:20px;animation:sp .8s linear infinite;display:inline-block}
        @keyframes sp{to{transform:rotate(360deg)}}
        @keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.6)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}.rp{animation:rp 1.5s infinite}
        .sc::-webkit-scrollbar{width:5px}.sc::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
        textarea:focus,input:focus{outline:none;border-color:#c2410c!important;box-shadow:0 0 0 3px rgba(194,65,12,.12)}
    </style>
</head>
<body>
<div id="root"></div>
<div class="wm">&copy; זכויות יוצרים לניתאי מלכה</div>
<script type="text/babel">
const { useState, useEffect, useRef, Fragment } = React;

const UNIS = {
    mor: { name: 'מו"ר / מרק"ם', limit: 750 },
    bgu: { name: 'בן-גוריון', limit: 1200 },
    tzfat: { name: 'צפת / בר-אילן', limit: 850 },
    haifa: { name: 'חיפה', limit: 1200 },
    ariel: { name: 'אריאל', limit: 850 }
};

const DEFAULT_QS = [
    'ספר על מקרה שבו פגעת במישהו. איך הבנת שפגעת? איך הרגשת ואיך פעלת? מה למדת ומה היית עושה אחרת?',
    'תאר מצב של תקשורת לא טובה מול אדם אחר. מה הקושי? איך ראית את הסיטואציה? איך הרגשת ואיך פתרת? מה למדת?',
    'תאר משימה חשובה שנכשלת בה למרות שציפית להצליח. מה הרגשת? איך התמודדת? מה למדת?',
    'ספר על מקרה שבו קיבלת ביקורת. מה הסיטואציה? איך הגבת? איך הביקורת השפיעה עליך?',
    'היכן התנדבת ולמה בחרת בהתנדבות הזו? מה פחות אהבת ולמה? איך התמודדת עם הקושי?',
    'מה מושך אותך ברפואה? תן דוגמאות קונקרטיות מחייך. (לא סיסמאות!)',
    'תאר מקרה שבו השפלת מישהו. איך הרגשת ומה עשית? מה למדת?'
];

const RUBRIC = "You are an extremely strict examiner for Israeli medical school admissions. Use STAR and HEXACO models. ALL evaluation text MUST be in Hebrew. Respond ONLY with valid JSON.";
const MARTIN_SYS = "You are Martin, a tough interviewer for Israeli medical school admissions. Challenge the candidate. Natural Hebrew, 2-3 sentences max.";

function Bar(p){
    const pct = Math.round((p.score/p.max)*100);
    const c = pct >= 80 ? '#16a34a' : pct >= 60 ? '#ca8a04' : '#dc2626';
    return(
        <div style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:600,marginBottom:3,color:'#475569'}}><span>{p.label}</span><span style={{color:c}}>{p.score}/{p.max}</span></div>
            <div style={{height:6,borderRadius:3,background:'#e2e8f0',overflow:'hidden'}}><div style={{height:'100%',width:pct+'%',background:c,borderRadius:3,transition:'width .6s'}}/></div>
        </div>
    );
}

function App(){
    const [view, setView] = useState('home');
    const [keys, setKeys] = useState(null);
    const [qText, setQText] = useState('');
    const [text, setText] = useState('');
    const [loading, setLoading] = useState(false);
    const [results, setResults] = useState(null);
    const [uni, setUni] = useState('tzfat');
    const [chat, setChat] = useState([]);
    const [ci, setCi] = useState('');
    const [mLd, setMLd] = useState(false);
    
    // Timer & Mic States
    const [timer, setTimer] = useState(180);
    const [tOn, setTOn] = useState(false);
    const [isRec, setIsRec] = useState(false);
    const [recO, setRecO] = useState(null);
    
    const ceRef = useRef(null);

    useEffect(() => {
        fetch('/api/keys').then(r=>r.json()).then(d => setKeys(d));
    }, []);

    // Timer Logic
    useEffect(() => {
        let iv;
        if(tOn && timer > 0) iv = setInterval(() => setTimer(t => t - 1), 1000);
        else if(timer === 0) { setTOn(false); if(isRec) togRec(); }
        return () => clearInterval(iv);
    }, [tOn, timer]);

    useEffect(() => { if(ceRef.current) ceRef.current.scrollIntoView({behavior:'smooth'}); }, [chat]);

    const pickQ = () => setQText(DEFAULT_QS[Math.floor(Math.random() * DEFAULT_QS.length)]);

    // Mic Logic
    const togRec = (target) => {
        if(isRec && recO) { recO.stop(); setIsRec(false); setRecO(null); return; }
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SR) { alert('השתמש בדפדפן כרום כדי להקליט.'); return; }
        const r = new SR(); r.lang = 'he-IL'; r.continuous = true;
        r.onresult = (e) => {
            let f = ''; for(let i=e.resultIndex; i<e.results.length; i++) if(e.results[i].isFinal) f += e.results[i][0].transcript + ' ';
            if(f) { if(target === 'chat') setCi(p => p + ' ' + f); else setText(p => p + ' ' + f); }
        };
        r.onerror = () => { setIsRec(false); setRecO(null); };
        r.onend = () => { setIsRec(false); setRecO(null); };
        r.start(); setIsRec(true); setRecO(r);
    };

    const analyze = async () => {
        if(text.length < 20) { alert('כתוב תשובה מלאה.'); return; }
        setLoading(true); setResults(null);
        try {
            const prompt = `Institution: ${UNIS[uni].name}\nQuestion: ${qText || 'שאלה פתוחה'}\nAnswer:\n${text}`;
            const promises = [];

            if(keys.GEMINI) promises.push(fetch('/api/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt,system:RUBRIC})}).then(r=>r.json()).then(d=>({sys:'gemini',data:d})));
            if(keys.CLAUDE) promises.push(fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt,system:RUBRIC})}).then(r=>r.json()).then(d=>({sys:'claude',data:d})));

            const raw = await Promise.allSettled(promises);
            const parsed = { gemini: null, claude: null };
            
            raw.forEach(r => {
                if(r.status !== 'fulfilled' || !r.value.data) return;
                const v = r.value;
                try {
                    let txt = v.sys === 'gemini' ? v.data.candidates[0].content.parts[0].text : (v.data.content ? v.data.content[0].text : v.data.text);
                    if(txt) parsed[v.sys] = JSON.parse(txt.replace(/```json|```/g,'').trim());
                } catch(e) { console.error("Parse error", e); }
            });
            setResults(parsed);
        } catch(e) { alert('שגיאה: ' + e.message); } finally { setLoading(false); }
    };

    const martinSend = async () => {
        if(!ci.trim() || !keys.GEMINI) return;
        if ('speechSynthesis' in window) { window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); }
        const nc = [...chat, {role:'user', text:ci}];
        setChat(nc); setCi(''); setMLd(true);
        try {
            const res = await fetch('/api/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:ci,system:MARTIN_SYS+'\nInstitution: '+UNIS[uni].name})});
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            setChat([...nc, {role:'martin', text:reply}]);
            if('speechSynthesis' in window){
                const ut = new SpeechSynthesisUtterance(reply); ut.lang='he-IL'; window.speechSynthesis.speak(ut);
            }
        } catch(e) { setChat([...nc, {role:'martin', text:'שגיאת תקשורת.'}]); } finally { setMLd(false); }
    };

    const RC = ({data, name}) => {
        if(!data) return <div className="p-4 border rounded-xl text-slate-300 text-center mb-4">הניתוח של {name} לא זמין</div>;
        return(
            <div className="bg-white p-5 rounded-2xl border mb-4 fi shadow-sm">
                <div className="flex justify-between mb-3 border-b pb-2">
                    <div className="text-2xl font-black text-orange-800">{data.total_score}/100</div>
                    <div className="text-xs font-bold text-slate-400">{name}</div>
                </div>
                <p className="text-sm italic mb-4">"{data.one_line}"</p>
                <Bar label="מסגרת טכנית" score={data.sections?.technical?.score||0} max={20}/>
                <Bar label="מבנה STAR" score={data.sections?.narrative?.score||0} max={30}/>
                <Bar label="פרופיל HEXACO" score={data.sections?.personality?.score||0} max={50}/>
                <div className="mt-3 p-3 bg-orange-50 rounded-lg text-xs leading-relaxed text-orange-800"><b>שכתוב:</b> {data.rewrite_suggestion}</div>
            </div>
        );
    };

    if(!keys) return <div className="flex flex-col items-center justify-center min-h-screen gap-3"><span className="ld"></span><div className="text-slate-400 font-bold text-sm">מתחבר לכספת...</div></div>;

    return(
        <div className="min-h-screen flex flex-col">
            <header className="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                <h1 className="text-xl font-black text-slate-800 cursor-pointer" onClick={() => {setView('home'); setTOn(false);}}>Med-Test <span className="text-orange-700">Pro</span></h1>
                {view !== 'home' && <select value={uni} onChange={e=>setUni(e.target.value)} className="bg-slate-100 border-none text-xs font-bold py-2 px-4 rounded-full">{Object.entries(UNIS).map(e=><option key={e[0]} value={e[0]}>{e[1].name}</option>)}</select>}
            </header>

            <main className="flex-1 p-6 max-w-6xl mx-auto w-full">
                {view === 'home' ? (
                    <div className="grid md:grid-cols-2 gap-8 mt-12">
                        <button onClick={() => {setView('multi'); setText(''); setQText(''); setResults(null); pickQ();}} className="bg-white p-12 rounded-3xl border-2 hover:border-orange-500 transition-all text-right shadow-sm group">
                            <div className="text-4xl mb-4 group-hover:scale-110 transition-transform">✍️</div>
                            <h3 className="text-xl font-bold">תרגול כתוב משולב</h3>
                            <p className="text-sm text-slate-500 mt-2">Gemini 3.1 Pro & Claude Opus</p>
                        </button>
                        <button onClick={() => {setChat([{role:'martin',text:'שלום, אני מרטין. בוא נתחיל - ספר לי על מקרה שבו היית צריך לשנות את דעתך.'}]); setView('martin');}} className="bg-white p-12 rounded-3xl border-2 hover:border-orange-500 transition-all text-right shadow-sm group">
                            <div className="text-4xl mb-4 group-hover:scale-110 transition-transform">🗣️</div>
                            <h3 className="text-xl font-bold">ראיון חי מול מרטין</h3>
                            <p className="text-sm text-slate-500 mt-2">סימולטור מראיין קולי</p>
                        </button>
                    </div>
                ) : view === 'multi' ? (
                    <div className="flex flex-col lg:flex-row gap-8">
                        <div className="flex-1 flex flex-col gap-4">
                            
                            {/* TIMER UI */}
                            <div className="bg-slate-800 text-white p-4 rounded-2xl flex justify-between items-center shadow-lg">
                                <div><div className="text-xs text-slate-400 font-bold mb-1">טיימר</div><div className={`text-3xl font-mono font-black ${timer<30?'text-red-400':''}`}>{Math.floor(timer/60)}:{(timer%60).toString().padStart(2,'0')}</div></div>
                                <div className="flex gap-2">
                                    <button onClick={() => setTOn(!tOn)} className="bg-orange-600 px-4 py-2 rounded-xl text-sm font-bold">{tOn?'עצור':'התחל'}</button>
                                    <button onClick={() => {setTOn(false); setTimer(180);}} className="bg-slate-600 px-3 py-2 rounded-xl text-xs font-bold">אפס</button>
                                </div>
                            </div>

                            {/* QUESTION BOX */}
                            <div className="bg-orange-50 border border-orange-100 p-4 rounded-2xl flex flex-col gap-2">
                                <div className="flex justify-between items-center">
                                    <span className="text-xs font-bold text-orange-900">השאלה (הקלד או בחר):</span>
                                    <button onClick={pickQ} className="text-xs font-bold text-orange-700 bg-white px-3 py-1 rounded-full border border-orange-200 hover:bg-orange-100">🎲 שאלה אקראית</button>
                                </div>
                                <textarea className="w-full bg-transparent border-none outline-none text-sm text-slate-800 resize-none" placeholder="הדבק לכאן את השאלה..." value={qText} onChange={e=>setQText(e.target.value)} rows="2"></textarea>
                            </div>
                            
                            {/* ANSWER AREA */}
                            <textarea className="flex-1 min-h-[250px] p-6 border-2 rounded-3xl outline-none resize-none text-lg sc" placeholder="כתוב את התשובה שלך כאן..." value={text} onChange={e=>setText(e.target.value)}></textarea>
                            
                            <div className="flex gap-2">
                                <button onClick={() => togRec('text')} className={`w-14 h-14 rounded-2xl flex items-center justify-center text-xl shrink-0 ${isRec ? 'bg-red-500 text-white rp' : 'bg-slate-200 text-slate-600'}`}>🎤</button>
                                <button onClick={analyze} disabled={loading} className="flex-1 bg-orange-800 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-orange-900 transition-all disabled:opacity-50">
                                    {loading ? <span className="ld"></span> : 'שלח לניתוח משולש'}
                                </button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto sc" style={{maxHeight:'80vh'}}>
                            {results ? (
                                <Fragment>
                                    <RC data={results.gemini} name="Gemini 3.1 Pro"/>
                                    <RC data={results.claude} name="Claude Opus"/>
                                </Fragment>
                            ) : <div className="h-64 flex flex-col items-center justify-center text-slate-300 font-bold"><div className="text-5xl mb-4">📊</div>התוצאות יופיעו כאן</div>}
                        </div>
                    </div>
                ) : (
                    <div className="max-w-2xl mx-auto flex flex-col bg-white border-2 rounded-3xl overflow-hidden shadow-xl" style={{height:'75vh'}}>
                        <div className="bg-orange-50 p-4 border-b font-bold text-orange-900 flex justify-between items-center">
                            <span>👨‍⚕️ מרטין הבוחן</span>
                            <span className="text-xs bg-orange-200 px-2 py-1 rounded-full">Gemini 3.1 Pro</span>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50 sc">
                            {chat.map((m,i)=><div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}><div className={`max-w-[85%] p-4 rounded-2xl ${m.role==='user'?'bg-orange-800 text-white rounded-tr-none':'bg-white border rounded-tl-none'}`}>{m.text}</div></div>)}
                            {mLd && <div className="ld m-2 border-orange-800"></div>}
                            <div ref={ceRef}/>
                        </div>
                        <div className="p-4 border-t flex gap-2">
                            <button onClick={() => togRec('chat')} className={`w-12 h-12 rounded-xl flex items-center justify-center shrink-0 ${isRec ? 'bg-red-500 text-white rp' : 'bg-slate-100'}`}>🎤</button>
                            <input className="flex-1 bg-slate-100 rounded-xl px-4 outline-none" placeholder="דבר אל מרטין..." value={ci} onChange={e=>setCi(e.target.value)} onKeyDown={e=>e.key==='Enter'&&martinSend()} />
                            <button onClick={martinSend} disabled={mLd} className="bg-orange-800 text-white w-12 h-12 rounded-xl disabled:opacity-50">↑</button>
                        </div>
                    </div>
                )}
            </main>
        </div>
    );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
