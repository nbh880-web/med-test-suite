<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med-Test Pro | Nitro Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Heebo',sans-serif;background:#f8fafc;color:#0f172a}
        .wm{position:fixed;bottom:10px;left:10px;opacity:.12;font-size:10px;pointer-events:none;font-weight:700}
        .ld{border:3px solid #e2e8f0;border-top:3px solid #c2410c;border-radius:50%;width:20px;height:20px;animation:sp .8s linear infinite;display:inline-block}
        @keyframes sp{to{transform:rotate(360deg)}}
        @keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.6)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}.rp{animation:rp 1.5s infinite}
        @keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .4s ease-out both}
        .sc::-webkit-scrollbar{width:5px}.sc::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
        textarea:focus,input:focus,select:focus{outline:none;border-color:#c2410c!important;box-shadow:0 0 0 3px rgba(194,65,12,.12)}
    </style>
</head>
<body>
<div id="root"></div>
<div class="wm">&copy; זכויות יוצרים לניתאי מלכה</div>
<script type="text/babel">
var useState=React.useState, useEffect=React.useEffect, useRef=React.useRef, Fragment=React.Fragment;

/* ========== CONFIG ========== */
var UNIS = {
    mor: { name: 'מו"ר / מרק"ם', limit: 750, format: 'סעיפים נפרדים', traits: 'אמפתיה, תקשורת, עבודת צוות, יציבות רגשית' },
    bgu: { name: 'בן-גוריון', limit: 1200, format: 'פסקה שלמה', traits: 'מחויבות חברתית, צניעות, עניין בפריפריה' },
    tzfat: { name: 'צפת / בר-אילן', limit: 850, format: '850 תווים לסעיף', traits: 'מוחצנות, מצפוניות, יציבות רגשית' },
    haifa: { name: 'חיפה', limit: 1200, format: 'פסקה שלמה', traits: 'תקשורת, אחריות, מוטיבציה' },
    ariel: { name: 'אריאל', limit: 850, format: 'שאלון ביוגרפי', traits: 'בשלות, כישורי תקשורת' }
};

var RUBRIC = "You are an extremely strict examiner for Israeli medical school admissions. Use STAR and HEXACO models. ALL evaluation text MUST be in Hebrew. Respond ONLY with valid JSON.";
var MARTIN_SYS = "You are Martin, a tough interviewer for Israeli medical school admissions. Challenge the candidate. Natural Hebrew, 2-3 sentences max.";

function Bar(p){
    var pct=Math.round((p.score/p.max)*100),c=pct>=80?'#16a34a':pct>=60?'#ca8a04':'#dc2626';
    return(<div style={{marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:600,marginBottom:3,color:'#475569'}}><span>{p.label}</span><span style={{color:c}}>{p.score}/{p.max}</span></div>
        <div style={{height:6,borderRadius:3,background:'#e2e8f0',overflow:'hidden'}}><div style={{height:'100%',width:pct+'%',background:c,borderRadius:3,transition:'width .6s'}}/></div>
    </div>);
}

function App(){
    var _v=useState('home'),view=_v[0],setView=_v[1];
    var _k=useState(null),keys=_k[0],setKeys=_k[1];
    var _tx=useState(''),text=_tx[0],setText=_tx[1];
    var _ld=useState(false),loading=_ld[0],setLoading=_ld[1];
    var _rs=useState(null),results=_rs[0],setResults=_rs[1];
    var _u=useState('tzfat'),uni=_u[0],setUni=_u[1];
    var _ch=useState([]),chat=_ch[0],setChat=_ch[1];
    var _ci=useState(''),ci=_ci[0],setCi=_ci[1];
    var _ml=useState(false),mLd=_ml[0],setMLd=_ml[1];
    var _rc=useState(false),isRec=_rc[0],setIsRec=_rc[1];
    var ceRef=useRef(null);

    useEffect(function(){
        fetch('/api/keys').then(r=>r.json()).then(d=>{
            setKeys(d);
            if(d.FIREBASE && !firebase.apps.length) firebase.initializeApp({apiKey:d.FIREBASE, projectId:'med-test-nitai'});
        });
    },[]);

    useEffect(function(){if(ceRef.current)ceRef.current.scrollIntoView({behavior:'smooth'})},[chat]);

    async function analyze(){
        if(text.length<20){alert('כתוב תשובה מלאה.');return}
        setLoading(true);setResults(null);
        try{
            var prompt='Institution: '+UNIS[uni].name+'\nAnswer:\n'+text;
            var promises=[];

            // Gemini 3.1 Pro via Proxy
            promises.push(fetch('/api/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt,system:RUBRIC})}).then(r=>r.json()).then(d=>({sys:'gemini',data:d})));

            // Claude Opus 4.6 via Proxy
            promises.push(fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt,system:RUBRIC})}).then(r=>r.json()).then(d=>({sys:'claude',data:d})));

            var raw=await Promise.allSettled(promises);
            var parsed={gemini:null,claude:null};
            raw.forEach(r=>{
                if(r.status!=='fulfilled'||!r.value.data)return;
                var v=r.value;
                try{
                    if(v.sys==='gemini') parsed.gemini = v.data.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
                    if(v.sys==='claude') parsed.claude = v.data.content[0].text.replace(/```json|```/g,'').trim();
                    parsed[v.sys] = JSON.parse(parsed[v.sys]);
                }catch(e){console.error("Parse error", e)}
            });
            setResults(parsed);
        }catch(e){alert('שגיאה: '+e.message)}finally{setLoading(false)}
    }

    async function martinSend(){
        if(!ci.trim()||!keys.GEMINI)return;
        if ('speechSynthesis' in window) { window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); }
        var nc=chat.concat([{role:'user',text:ci}]);setChat(nc);setCi('');setMLd(true);
        try{
            var res=await fetch('/api/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:ci,system:MARTIN_SYS+'\nInstitution: '+UNIS[uni].name})});
            var data=await res.json();var reply=data.candidates[0].content.parts[0].text;
            setChat(nc.concat([{role:'martin',text:reply}]));
            if('speechSynthesis' in window){
                var ut=new SpeechSynthesisUtterance(reply);ut.lang='he-IL';window.speechSynthesis.speak(ut);
            }
        }catch(e){setChat(nc.concat([{role:'martin',text:'שגיאת תקשורת.'}]))}finally{setMLd(false)}
    }

    function RC({data,name}){
        if(!data)return <div class="p-4 border rounded-xl text-slate-300 text-center">הניתוח של {name} לא זמין</div>;
        return(<div class="bg-white p-5 rounded-2xl border mb-4 fi shadow-sm">
            <div class="flex justify-between mb-3 border-b pb-2">
                <div class="text-2xl font-black text-orange-800">{data.total_score}/100</div>
                <div class="text-xs font-bold text-slate-400">{name}</div>
            </div>
            <p class="text-sm italic mb-4">"{data.one_line}"</p>
            <Bar label="מסגרת טכנית" score={data.sections?.technical?.score||0} max={20}/>
            <Bar label="מבנה STAR" score={data.sections?.narrative?.score||0} max={30}/>
            <Bar label="פרופיל HEXACO" score={data.sections?.personality?.score||0} max={50}/>
            <div class="mt-3 p-3 bg-orange-50 rounded-lg text-xs leading-relaxed text-orange-800"><b>שכתוב:</b> {data.rewrite_suggestion}</div>
        </div>);
    }

    return(<div class="min-h-screen flex flex-col">
        <header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
            <h1 class="text-xl font-black text-slate-800 cursor-pointer" onClick={()=>setView('home')}>Med-Test <span class="text-orange-700">Pro</span></h1>
            {view!=='home'&&<select value={uni} onChange={e=>setUni(e.target.value)} class="bg-slate-100 border-none text-xs font-bold py-2 px-4 rounded-full">{Object.entries(UNIS).map(e=><option key={e[0]} value={e[0]}>{e[1].name}</option>)}</select>}
        </header>

        <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
            {view==='home'?(
                <div class="grid md:grid-cols-2 gap-8 mt-12">
                    <button onClick={()=>setView('multi')} class="bg-white p-12 rounded-3xl border-2 hover:border-orange-500 transition-all text-right shadow-sm">
                        <div class="text-4xl mb-4">✍️</div>
                        <h3 class="text-xl font-bold">תרגול כתוב משולב</h3>
                        <p class="text-sm text-slate-500 mt-2">Gemini 3.1 Pro & Claude Opus 4.6</p>
                    </button>
                    <button onClick={()=>{setChat([{role:'martin',text:'שלום, אני מרטין. ספר לי על מקרה שבו היית צריך לשנות את דעתך.'}]);setView('martin')}} class="bg-white p-12 rounded-3xl border-2 hover:border-orange-500 transition-all text-right shadow-sm">
                        <div class="text-4xl mb-4">🗣️</div>
                        <h3 class="text-xl font-bold">ראיון חי מול מרטין</h3>
                        <p class="text-sm text-slate-500 mt-2">סימולטור מראיין קולי</p>
                    </button>
                </div>
            ):view==='multi'?(
                <div class="flex flex-col lg:flex-row gap-8">
                    <div class="flex-1 flex flex-col gap-4">
                        <textarea class="flex-1 min-h-[400px] p-6 border-2 rounded-3xl outline-none resize-none text-lg" placeholder="כתוב את התשובה שלך כאן..." value={text} onChange={e=>setText(e.target.value)}></textarea>
                        <button onClick={analyze} disabled={loading} class="w-full bg-orange-800 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-orange-900 transition-all">
                            {loading?<span class="ld"></span>:'שלח לניתוח משולש'}
                        </button>
                    </div>
                    <div class="flex-1 overflow-y-auto" style={{maxHeight:'80vh'}}>
                        <RC data={results?.gemini} name="Gemini 3.1 Pro"/>
                        <RC data={results?.claude} name="Claude Opus 4.6"/>
                    </div>
                </div>
            ):(
                <div class="max-w-2xl mx-auto flex flex-col bg-white border-2 rounded-3xl overflow-hidden shadow-xl" style={{height:'75vh'}}>
                    <div class="bg-orange-50 p-4 border-b font-bold text-orange-900 flex items-center gap-2">👨‍⚕️ מרטין הבוחן</div>
                    <div class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50">
                        {chat.map((m,i)=><div key={i} class={'flex '+(m.role==='user'?'justify-end':'justify-start')}><div class={'max-w-[85%] p-4 rounded-2xl '+(m.role==='user'?'bg-orange-800 text-white':'bg-white border')}>{m.text}</div></div>)}
                        {mLd&&<div class="ld"></div>}
                        <div ref={ceRef}/>
                    </div>
                    <div class="p-4 border-t flex gap-2">
                        <input class="flex-1 bg-slate-100 rounded-xl px-4 outline-none" placeholder="דבר אל מרטין..." value={ci} onChange={e=>setCi(e.target.value)} onKeyDown={e=>e.key==='Enter'&&martinSend()} />
                        <button onClick={martinSend} class="bg-orange-800 text-white w-12 h-12 rounded-xl">↑</button>
                    </div>
                </div>
            )}
        </main>
    </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
